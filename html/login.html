<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Screen</title>
    <link rel="stylesheet" href="../css/login.css">
    
</head>
<body>
    <div class="login-container">
        <h2>Login</h2>
        <form action="#" method="POST">
            <input id="user" type="text" class="input-field" placeholder="User">
            <p></p>
            <input id="password" type="password" class="input-field" placeholder="Password">
            <p id="error-msg" style="color: red; margin: 8px 0; visibility: hidden; height: 20px;"></p>
            <button id="btn" type="button" class="login-button">Login</button>
            <p></p>
            <button id="btn2" type="button" class="create-account-button">Create Account</button>

        </form>
    </div>
    <script src="../js/script_login.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsrsasign/10.8.2/jsrsasign-all-min.js"></script>

</body>
</html>
