<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account</title>
    <link rel="stylesheet" href="css/login.css">
    <link rel="stylesheet" href="css/register.css">

</head>
<body>
    <div class="register-container">
        <h2>Create Account</h2>
        <form action="#" method="POST">
            <input id="username" type="text" class="input-field" placeholder="Username" required>
            <p></p>
            <input id="email" type="email" class="input-field" placeholder="Email" required>
            <p></p>
            <input id="password" type="password" class="input-field" placeholder="Password" required>
            <p></p>
            <input id="confirm-password" type="password" class="input-field" placeholder="Confirm Password" required>
            <p></p>
            <button id="register-btn" type="button" class="register-button">Sign Up</button>
            <p>Already have an account?</p>
            <button id="btn2" type="button" class="login-here-button" onclick="window.location.href='index.html'">Back to login</button>
        </form>
    </div>
    <script src="script.js"></script>
</body>
</html>
