<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Screen</title>
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <div class="login-container">
        <h2>Login</h2>
        <form action="#" method="POST">
            <input id="user" type="text" class="input-field" placeholder="User">
            <p></p>
            <input id="password" type="password" class="input-field" placeholder="Password">
            <p></p>
            <button id="btn" type="button" class="login-button">Login</button>
            <p></p>
            <button id="btn2" type="button" class="create-account-button" onclick="window.location.href='register.html'">Create Account</button>

        </form>
    </div>
    <script src="script.js"></script>
</body>
</html>
